auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

ingester:
  wal:
    dir: /loki/wal
  chunk_idle_period: 3m
  max_chunk_age: 1h
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
  filesystem:
    directory: /loki/chunks

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# КОМПАКТОР (СЖАТИЕ ИНДЕКСОВ TSDB)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
compactor:
  working_directory: /loki/compactor
  # Убрано shared_store, так как в новых версиях Loki он берется из schema_config