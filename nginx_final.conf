worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # Rate Limiting зоны
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # /auth/login — 5 req/sec (защита от Brute-force)
    limit_req_zone $binary_remote_addr
        zone=auth_limit:10m rate=5r/s;

    # /drivers/ — 10 req/sec (геолокация)
    limit_req_zone $binary_remote_addr
        zone=driver_limit:10m rate=10r/s;

    # /rides/ — 30 req/sec (основной API)
    limit_req_zone $binary_remote_addr
        zone=rides_limit:10m rate=30r/s;

    # WebSocket настройки
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Передача реального IP клиента микросервисам
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For
        $proxy_add_x_forwarded_for;

    server {
        listen 80;

        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Auth — строгий лимит
        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        location /auth/ {
            # Только POST разрешён для login/register
            limit_except POST {
                deny all;
            }
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://auth-service:3005/;
        }

        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Rides — стандартный лимит
        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        location /rides/ {
            limit_req zone=rides_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://ride-service:3000/;
        }

        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Drivers — средний лимит
        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        location /drivers/ {
            limit_req zone=driver_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://driver-service:3001/;
        }

        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Admin — только GET, строгий лимит
        # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        location /admin/ {
            limit_except GET {
                deny all;
            }
            limit_req zone=auth_limit burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://admin-service:3004/;
        }
    }
}