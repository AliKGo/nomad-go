user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  client_max_body_size 1M;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/s;
  limit_req_zone $binary_remote_addr zone=ride_limit:10m    rate=20r/s;
  limit_req_zone $binary_remote_addr zone=driver_limit:10m  rate=30r/s;
  limit_req_zone $binary_remote_addr zone=docs_limit:10m    rate=100r/s;

  # Docker DNS
  resolver 127.0.0.11 valid=30s ipv6=off;

  upstream auth_service {
    server auth-service:3005;
    keepalive 32;
  }

  upstream ride_service {
    server ride-service:3000;
    keepalive 32;
  }

  upstream driver_service {
    server driver-service:3001;
    keepalive 32;
  }

  upstream admin_service {
    server admin-service:3004;
    keepalive 32;
  }

  upstream grafana_svc {
    server grafana:3000;
  }

  upstream prometheus_svc {
    server prometheus:9090;
  }

  server {
    listen 80 default_server;
    server_name _;

    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          30s;

    location = /health {
      limit_except GET { deny all; }
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    location = / {
      default_type text/html;
      return 200 '<!DOCTYPE html><html><head><title>Nomad Go</title></head><body><h1>Nomad Go</h1><p>System is running</p><ul><li><a href="/docs/auth/index.html">Auth API Docs</a></li><li><a href="/docs/ride/index.html">Ride API Docs</a></li><li><a href="/docs/driver/index.html">Driver API Docs</a></li></ul></body></html>';
    }

    # ============================================
    # SWAGGER
    # ============================================

    location ^~ /docs/auth/ {
      limit_except GET { deny all; }
      limit_req zone=docs_limit burst=50 nodelay;
      proxy_pass http://auth_service/swagger/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
    }

    location ^~ /docs/ride/ {
      limit_except GET { deny all; }
      limit_req zone=docs_limit burst=50 nodelay;
      proxy_pass http://ride_service/swagger/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
    }

    location ^~ /docs/driver/ {
      limit_except GET { deny all; }
      limit_req zone=docs_limit burst=50 nodelay;
      proxy_pass http://driver_service/swagger/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
    }

    location ^~ /docs/admin/ {
      limit_except GET { deny all; }
      allow 192.168.110.173;
      deny all;
      limit_req zone=docs_limit burst=50 nodelay;
      proxy_pass http://admin_service/swagger/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
    }

    # ============================================
    # AUTH SERVICE
    # ============================================

    location /auth/ {
      limit_except POST GET { deny all; }
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://auth_service;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    # ============================================
    # RIDE SERVICE
    # ============================================

    location = /rides {
      limit_except POST { deny all; }
      limit_req zone=ride_limit burst=20 nodelay;
      proxy_pass http://ride_service;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    location ~ ^/rides/([^/]+)/cancel$ {
      limit_except POST { deny all; }
      limit_req zone=ride_limit burst=20 nodelay;
      proxy_pass http://ride_service;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    location ^~ /ws/passengers/ {
      limit_except GET { deny all; }
      limit_req zone=ride_limit burst=5 nodelay;
      proxy_pass http://ride_service;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 60s;
      proxy_send_timeout    3600s;
      proxy_read_timeout    3600s;
      proxy_next_upstream off;
    }

    # ============================================
    # DRIVER SERVICE
    # ============================================

    location /drivers/ {
      limit_except POST GET { deny all; }
      limit_req zone=driver_limit burst=30 nodelay;
      proxy_pass http://driver_service;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    location ^~ /ws/drivers/ {
      limit_except GET { deny all; }
      limit_req zone=driver_limit burst=5 nodelay;
      proxy_pass http://driver_service;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 60s;
      proxy_send_timeout    3600s;
      proxy_read_timeout    3600s;
      proxy_next_upstream off;
    }

    # ============================================
    # ADMIN — только с доверенного IP
    # ============================================

    location /admin/ {
      limit_except GET { deny all; }
      allow 192.168.110.173;
      deny all;
      limit_req zone=general_limit burst=10 nodelay;
      proxy_pass http://admin_service;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    # ============================================
    # OBSERVABILITY — только с доверенного IP
    # ============================================

    location /grafana/ {
      allow 192.168.110.173;
      deny all;
      rewrite ^/grafana/(.*)$ /$1 break;
      proxy_pass http://grafana_svc;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /prometheus/ {
      allow 192.168.110.173;
      deny all;
      rewrite ^/prometheus/(.*)$ /$1 break;
      proxy_pass http://prometheus_svc;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    error_page 429 @rate_limit_exceeded;
    location @rate_limit_exceeded {
      default_type application/json;
      return 429 '{"error":"Too many requests","retry_after":60}';
    }

    error_page 502 503 504 @service_unavailable;
    location @service_unavailable {
      default_type application/json;
      return 503 '{"error":"Service temporarily unavailable"}';
    }
  }
}