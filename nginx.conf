user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # ============================================
  # RATE LIMITING ZONES
  # ============================================
  
  # 10 запросов в секунду на IP (100req/10sec)
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
  
  # 5 запросов в секунду для auth (защита от brute-force)
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
  
  # 20 запросов в секунду для ride requests
  limit_req_zone $binary_remote_addr zone=ride_limit:10m rate=20r/s;
  
  # 30 запросов в секунду для driver location updates
  limit_req_zone $binary_remote_addr zone=driver_limit:10m rate=30r/s;

  # ============================================
  # UPSTREAM SERVICES
  # ============================================
  
  upstream auth_service {
    server auth-service:3005 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream ride_service {
    server ride-service:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream driver_service {
    server driver-service:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream admin_service {
    server admin-service:3004 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ============================================
  # MAIN SERVER BLOCK
  # ============================================
  
  server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ============================================
    # HEALTH CHECK ENDPOINTS
    # ============================================
    
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    # ============================================
    # AUTH SERVICE - /auth/*
    # ============================================
    
    location /auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      
      proxy_pass http://auth_service/auth/;
      
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      
      # Retry logic
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    # ============================================
    # RIDE SERVICE - /rides/*
    # ============================================
    
    location /rides/ {
      limit_req zone=ride_limit burst=20 nodelay;
      
      proxy_pass http://ride_service/rides/;
      
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    # ============================================
    # RIDE SERVICE - WebSocket /ws/passengers/*
    # ============================================
    
    location /ws/passengers/ {
      limit_req zone=ride_limit burst=5 nodelay;
      
      proxy_pass http://ride_service/ws/passengers/;
      
      # WebSocket headers
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      
      # Long timeout for WebSocket connections
      proxy_connect_timeout 60s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
      
      # Don't retry WebSocket connections
      proxy_next_upstream off;
    }

    # ============================================
    # DRIVER SERVICE - /drivers/*
    # ============================================
    
    location /drivers/ {
      limit_req zone=driver_limit burst=30 nodelay;
      
      proxy_pass http://driver_service/drivers/;
      
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    # ============================================
    # DRIVER SERVICE - WebSocket /ws/drivers/*
    # ============================================
    
    location /ws/drivers/ {
      limit_req zone=driver_limit burst=5 nodelay;
      
      proxy_pass http://driver_service/ws/drivers/;
      
      # WebSocket headers
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      
      # Long timeout for WebSocket connections
      proxy_connect_timeout 60s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
      
      # Don't retry WebSocket connections
      proxy_next_upstream off;
    }

    # ============================================
    # ADMIN SERVICE - /admin/*
    # ============================================
    
    location /admin/ {
      limit_req zone=general_limit burst=10 nodelay;
      
      proxy_pass http://admin_service/admin/;
      
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
      proxy_next_upstream_tries 2;
    }

    # ============================================
    # ROOT PATH - REDIRECT TO HEALTH
    # ============================================
    
    location / {
      return 301 /health;
    }

    # ============================================
    # ERROR PAGES
    # ============================================
    
    error_page 429 @rate_limit_exceeded;
    location @rate_limit_exceeded {
      default_type application/json;
      return 429 '{"error":"Too many requests. Please try again later.","retry_after":60}';
    }

    error_page 502 503 504 @service_unavailable;
    location @service_unavailable {
      default_type application/json;
      return 503 '{"error":"Service temporarily unavailable. Please try again later."}';
    }
  }
}