networks:
  net:
    driver: bridge

volumes:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  postgres_data:

services:
  postgresql:
    image: postgis/postgis:16-3.4
    hostname: postgresql
    networks:
      - net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ridehail_user
      POSTGRES_PASSWORD: ridehail_pass
      POSTGRES_DB: ridehail_db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridehail_user -d ridehail_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    networks:
      - net
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://ridehail_user:ridehail_pass@postgresql:5432/ridehail_db?sslmode=disable",
        "up"
      ]
    depends_on:
      - postgresql
    restart: on-failure:5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    hostname: rabbitmq
    networks:
      - net
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq_definitions.json:/etc/rabbitmq/rabbitmq_definitions.json:ro
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    hostname: postgres-exporter
    networks:
      - net
    environment:
      DATA_SOURCE_NAME: "postgresql://ridehail_user:ridehail_pass@postgresql:5432/ridehail_db?sslmode=disable"
    restart: unless-stopped
    depends_on:
      - postgresql

  auth-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
    command: ["./main", "--mode=auth-service"]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_USER=ridehail_user
      - DB_PASSWORD=ridehail_pass

  ride-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
      - rabbitmq
    command: ["./main", "--mode=ride-service"]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672

  driver-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
      - rabbitmq
    command: ["./main", "--mode=driver-service"]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672

  admin-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
      - rabbitmq
    command: ["./main", "--mode=admin-service"]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - net
    depends_on:
      - auth-service
      - ride-service
      - driver-service
      - admin-service
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    networks:
      - net
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    networks:
      - net
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    hostname: loki
    networks:
      - net
    volumes:
      - loki_data:/loki
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    hostname: promtail
    networks:
      - net
    volumes:
      - /var/log:/var/log:ro
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki