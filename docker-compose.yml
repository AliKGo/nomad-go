networks:
  net:
    driver: bridge

volumes:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  postgres_data:

services:
  postgresql:
    image: postgis/postgis:16-3.4
    hostname: postgresql
    networks:
      - net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridehail_user -d ridehail_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    networks:
      - net
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://ridehail_user:ridehail_pass@postgresql:5432/ridehail_db?sslmode=disable",
        "up"
      ]
    depends_on:
      - postgresql
    restart: on-failure:5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    hostname: rabbitmq
    networks:
      - net
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq_definitions.json:/etc/rabbitmq/rabbitmq_definitions.json:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    networks:
      - net
    command:
      - -nginx.scrape-uri=http://nginx:8080/stub_status

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    hostname: postgres-exporter
    networks:
      - net
    environment:
      DATA_SOURCE_NAME: "postgresql://ridehail_user:ridehail_pass@postgresql:5432/ridehail_db?sslmode=disable"
    restart: unless-stopped
    depends_on:
      - postgresql

  # ============================================
  # Services - НЕ ДОСТУПНЫ ИЗВНЕ (нет ports)
  # ============================================

  auth-service:
    build: .
    networks:
      - net
    depends_on:
      postgresql:
        condition: service_healthy
    command: [ "./main", "--mode=auth-service" ]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}

  ride-service:
    build: .
    networks:
      - net
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: [ "./main", "--mode=ride-service" ]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASS}

  driver-service:
    build: .
    networks:
      - net
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: [ "./main", "--mode=driver-service" ]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASS}

  admin-service:
    build: .
    networks:
      - net
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: [ "./main", "--mode=admin-service" ]
    restart: on-failure:5
    environment:
      - DB_HOST=postgresql
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASS}

  # ============================================
  # NGINX - ЕДИНСТВЕННЫЙ ОТКРЫТЫЙ СЕРВИС
  # ============================================

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - net
    depends_on:
      auth-service:
        condition: service_started
      ride-service:
        condition: service_started
      driver-service:
        condition: service_started
      admin-service:
        condition: service_started
    restart: unless-stopped

  # ============================================
  # Observability
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    networks:
      - net
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    networks:
      - net
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SERVER_DOMAIN=localhost
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/nomad-go-overview.json
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    hostname: loki
    networks:
      - net
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    networks:
      - net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki