version: '3.8'

networks:
  net:
    driver: bridge

volumes:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  postgres_data:

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - net
    depends_on:
      - auth-service
      - ride-service
      - driver-service
      - admin-service

  postgresql:
    image: postgis/postgis:16-3.4
    hostname: postgresql
    ports:
      - "5432:5432"
    networks:
      - net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ridehail_user
      POSTGRES_PASSWORD: ridehail_pass
      POSTGRES_DB: ridehail_db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridehail_user -d ridehail_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    networks:
      - net
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq_definitions.json:/etc/rabbitmq/rabbitmq_definitions.json:ro
    restart: always
    # Упрощенный healthcheck, чтобы не блокировать запуск
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  driver-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
      - rabbitmq
    command: ["./main", "--mode=driver-service"]
    ports:
      - "3001:3001"
    restart: on-failure

  admin-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
      - rabbitmq
    command: ["./main", "--mode=admin-service"]
    ports:
      - "3004:3004"
    restart: on-failure

  auth-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
    command: ["./main", "--mode=auth-service"]
    ports:
      - "3005:3005"
    restart: on-failure

  ride-service:
    build: .
    networks:
      - net
    depends_on:
      - postgresql
      - rabbitmq
    command: ["./main", "--mode=ride-service"]
    ports:
      - "3000:3000"
    restart: on-failure

  # Вспомогательные сервисы (мониторинг)
  prometheus:
    image: prom/prometheus:latest
    networks:
      - net
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    networks:
      - net
    ports:
      - "3333:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    networks:
      - net
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped